start-at-login = true
config-version = 2

after-startup-command = [
    'workspace 5'
]

exec-on-workspace-change = ['/bin/bash', '-c', '$HOME/.config/aerospace/workspaces.sh --init']

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7"]

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       10
    outer.bottom =     10
    outer.top =        10
    outer.right =      10

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'

    alt-p = 'workspace prev'
    alt-n = 'workspace next'
    alt-f = 'fullscreen --no-outer-gaps'
    alt-s = 'mode service'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'

    alt-minus = 'workspace-back-and-forth'

    alt-shift-m = 'exec-and-forget $HOME/.config/aerospace/workspaces.sh --move-node-between-monitors'
    alt-m = 'focus-monitor --wrap-around next'

    alt-enter = 'exec-and-forget open -na Ghostty'
    alt-c = 'exec-and-forget open -na "Google Chrome"'

    alt-w = 'mode merge'
    alt-r = 'exec-and-forget $HOME/.config/aerospace/workspaces.sh --reset'



# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    f = ['layout floating tiling', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']

[mode.merge.binding]
    esc = 'mode main'
    1 = ['exec-and-forget $HOME/.config/aerospace/workspaces.sh --merge 1', 'mode main']
    2 = ['exec-and-forget $HOME/.config/aerospace/workspaces.sh --merge 2', 'mode main']
    3 = ['exec-and-forget $HOME/.config/aerospace/workspaces.sh --merge 3', 'mode main']
    4 = ['exec-and-forget $HOME/.config/aerospace/workspaces.sh --merge 4', 'mode main']
    6 = ['exec-and-forget $HOME/.config/aerospace/workspaces.sh --merge 6', 'mode main']
    7 = ['exec-and-forget $HOME/.config/aerospace/workspaces.sh --merge 7', 'mode main']



[workspace-to-monitor-force-assignment]
    S = 'secondary'

[[on-window-detected]]
    if.app-id = 'com.1password.1password'
    run = 'layout floating'
[[on-window-detected]]
  if.app-id = 'com.apple.ActivityMonitor'
  run = 'layout floating'
[[on-window-detected]]
  if.app-id = 'com.apple.finder'
  run = 'layout floating'
